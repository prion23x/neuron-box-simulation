<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Ion Simulation</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <canvas id="world"></canvas>

  <div id="membrane-state-panel"></div>

  <div id="simulation-info-panel">
    <div class="controls">

      <div class="timescale">
        <button class="start-btn btn" type="button" aria-label="Start simulation">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <polygon points="6,3 17,10 6,17" fill="white" />
          </svg>
        </button>

        <button class="pause-btn btn" type="button" aria-label="Pause simulation">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="4" y="3" width="4" height="14" rx="1" fill="white" />
            <rect x="12" y="3" width="4" height="14" rx="1" fill="white" />
          </svg>
        </button>

        <button class="reset-btn btn" type="button" aria-label="Reset simulation">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M16 6V2.5L13.5 5A6 6 0 1 0 16 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </div>

      <div class="speed">
        <button class="speed-display" type="button">1.0</button>
        <input class="speed-slider" type="range" min="0.1" max="3.0" step="0.1" value="1.0">
      </div>
    </div>
    <div class="logs"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script type="module" src="../src/main.js"></script>
  <script type="module" src="../src/ui/controls.js"></script>
</body>

</html>
